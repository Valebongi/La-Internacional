# Nginx config para frontend + proxy al backend
# Variables sustituidas por docker-entrypoint.sh al iniciar el container:
#   NGINX_PORT   → puerto en el que escucha (default 80; Railway inyecta PORT)
#   BACKEND_HOST → host:port del backend    (default localhost:8080)

server {
  listen NGINX_PORT_PLACEHOLDER;
  server_name _;

  # Resolver interno de Railway/Docker para DNS lazy (evita 502 al arrancar si el backend no está listo)
  resolver 127.0.0.11 valid=30s ipv6=off;
  set $backend "http://BACKEND_HOST_PLACEHOLDER";

  # Frontend (SPA)
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  # Assets estáticos versionados (cache agresivo)
  location ~ ^/(assets|dist)/ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable";
    expires 1y;
  }

  # Proxy al backend (API)
  location /api/ {
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
  }

  # Proxy webhooks Meta (SSE / streaming)
  location /webhooks/ {
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection '';
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
  }

  location = /ping {
    access_log off;
    return 200 "ok";
    add_header Content-Type text/plain;
  }

  location /health {
    proxy_pass $backend;
  }

  gzip on;
  gzip_types text/css application/javascript application/json;
  gzip_min_length 1000;
}
