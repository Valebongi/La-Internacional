# Docker Compose para desarrollo local
# Incluye: Backend (gateway), Frontend (Vite), PostgreSQL

version: '3.8'

services:
  # PostgreSQL (main + postsale DBs)
  postgres:
    image: postgres:16-alpine
    container_name: lid-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (NestJS gateway)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        NODE_ENV: development
    container_name: lid-backend
    environment:
      NODE_ENV: development
      GATEWAY_PORT: 8080
      AUTH_PORT: 3001
      CRM_CORE_PORT: 3002
      MESSAGING_PORT: 3003
      BROADCASTS_PORT: 3004
      POSTSALE_PORT: 3005
      ANALYTICS_PORT: 3006
      INTEGRATION_PORT: 3007
      
      # Internal (docker network)
      AUTH_URL: http://backend:3001
      CRM_CORE_URL: http://backend:3002
      MESSAGING_URL: http://backend:3003
      BROADCASTS_URL: http://backend:3004
      POSTSALE_URL: http://backend:3005
      ANALYTICS_URL: http://backend:3006
      INTEGRATION_URL: http://backend:3007
      
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lid
      POSTSALE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lid_postsale
      
      # Auth
      JWT_SECRET: dev-secret-change-in-prod
      JWT_EXPIRES_IN: 7d
      
      # Meta (from .env.local)
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-}
      META_BUSINESS_ACCOUNT_ID: ${META_BUSINESS_ACCOUNT_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
      META_GRAPH_VERSION: v25.0
      
      # External system
      EXTERNAL_SYSTEM_BASE_URL: ${EXTERNAL_SYSTEM_BASE_URL:-}
      EXTERNAL_SYSTEM_API_KEY: ${EXTERNAL_SYSTEM_API_KEY:-}
      EXTERNAL_SYSTEM_MOCK: ${EXTERNAL_SYSTEM_MOCK:-true}
    
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Hot reload for development
      - ./apps/backend:/app/apps/backend
      - /app/node_modules
    command: npm run start:gateway --workspace apps/backend

  # Frontend (Vite dev server)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lid-frontend
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:8080
      VITE_APP_NAME: CRM La Internacional
      VITE_USE_MOCKS: "false"
      VITE_POLL_INBOX_MS: "15000"
      VITE_POLL_NOTIFICATIONS_MS: "30000"
      VITE_POLL_CHAT_MS: "5000"
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_APP_ID: ${META_APP_ID:-}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:

networks:
  default:
    name: lid-network
