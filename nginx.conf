# Nginx config para frontend + proxy al backend
# Soporta tanto desarrollo local como Railway

# En Railway, usar variable de entorno BACKEND_URL
# En local, usar localhost:8080
upstream backend {
  # Resolver permite DNS dinámico en Railway
  # En producción Railway: la-internacional-backend.railway.internal
  # En local: localhost:8080
  server ${BACKEND_HOST:-localhost:8080};
}

server {
  listen 80;
  server_name _;

  # Frontend (SPA)
  location / {
    root /usr/share/nginx/html;
    index index.html;
    
    # SPA: cualquier ruta sin extensión → index.html
    try_files $uri $uri/ /index.html;
    
    # Cache control
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  # Assets (versionados, cache agresivo)
  location ~ ^/(assets|dist)/ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable";
    expires 1y;
  }

  # Proxy al backend
  location /api/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    
    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
  }

  # Proxy Server-Sent Events (SSE) for webhooks
  location /webhooks/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    
    # SSE requires specific headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Disable buffering for SSE streaming
    proxy_buffering off;
    proxy_cache off;
    
    # Keep connection alive for SSE
    proxy_set_header Connection '';
    
    # Timeouts for long-lived connections
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
  }

  # Health check (gateway /health)
  location /health {
    proxy_pass http://backend;
  }

  # Gzip compression
  gzip on;
  gzip_types text/css application/javascript application/json;
  gzip_min_length 1000;
}
