<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">

  <!-- Background blanco puro -->
  <rect width="1080" height="1080" fill="#FFFFFF"/>

  <!-- TAG chip top -->
  <rect x="80" y="80" width="260" height="42" fill="#00C8E8"/>
  <text x="210" y="108" font-family="Arial Black, Arial, sans-serif" font-size="15" font-weight="900" fill="#061428" text-anchor="middle" letter-spacing="3">AUTOMATIZACIÓN</text>

  <!-- Hero number -->
  <text x="72" y="420" font-family="Arial Black, Arial, sans-serif" font-size="310" font-weight="900" fill="#061428" letter-spacing="-12">60%</text>

  <!-- Cyan rule bajo el número -->
  <rect x="80" y="440" width="560" height="8" fill="#00C8E8"/>

  <!-- Descriptor pequeño pero no diminuto -->
  <text x="80" y="498" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#6A8A9A" letter-spacing="2">DE LAS TAREAS OPERATIVAS SON AUTOMATIZABLES HOY.</text>

  <!-- Headline principal -->
  <text x="80" y="598" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" fill="#061428">Tu equipo no necesita</text>
  <text x="80" y="668" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" fill="#061428">trabajar más.</text>
  <text x="80" y="740" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" fill="#061428">Necesita sistemas</text>
  <text x="80" y="810" font-family="Arial Black, Arial, sans-serif" font-size="60" font-weight="900" fill="#00C8E8">que trabajen por ellos.</text>

  <!-- Footer sólido navy -->
  <rect x="0" y="886" width="1080" height="194" fill="#061428"/>
  <text x="80" y="960" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF">Digital<tspan fill="#00C8E8">Axios</tspan></text>
  <text x="80" y="998" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#3A6A7A" letter-spacing="3">CUSTOM SOFTWARE ENGINEERING</text>
  <text x="80" y="1040" font-family="Arial, sans-serif" font-size="18" font-weight="300" fill="#2A4A5A">Automatización inteligente para empresas que quieren escalar.</text>

</svg>
