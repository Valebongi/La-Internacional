<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">

  <!-- Background blanco -->
  <rect width="1080" height="1080" fill="#FFFFFF"/>

  <!-- Header navy sólido -->
  <rect x="0" y="0" width="1080" height="320" fill="#061428"/>

  <!-- Acento cyan en header -->
  <rect x="0" y="0" width="1080" height="8" fill="#00C8E8"/>

  <!-- TAG en header -->
  <rect x="80" y="56" width="210" height="38" fill="#00C8E8"/>
  <text x="185" y="81" font-family="Arial Black, Arial, sans-serif" font-size="14" font-weight="900" fill="#061428" text-anchor="middle" letter-spacing="3">CASOS DE USO</text>

  <!-- Headline en header -->
  <text x="80" y="178" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="#FFFFFF">¿Dónde puede vivir</text>
  <text x="80" y="252" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="#FFFFFF">la IA en tu empresa?</text>

  <!-- Sub en header -->
  <text x="80" y="298" font-family="Arial, sans-serif" font-size="20" fill="#4A8A9A">En todo lugar donde hoy hay un humano repitiendo lo mismo.</text>

  <!-- Grid 3x2 de casos -->
  <!-- Fila 1 -->

  <!-- Card 1 — Legal -->
  <rect x="80" y="348" width="284" height="200" fill="#F4F9FB"/>
  <rect x="80" y="348" width="284" height="6" fill="#00C8E8"/>
  <text x="172" y="400" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="#061428" text-anchor="middle">LEGAL</text>
  <text x="172" y="432" font-family="Arial, sans-serif" font-size="17" fill="#6A8A9A" text-anchor="middle">Contratos · Due Diligence</text>
  <text x="172" y="468" font-family="Arial, sans-serif" font-size="16" fill="#9AAAB4" text-anchor="middle">Análisis automático</text>
  <text x="172" y="490" font-family="Arial, sans-serif" font-size="16" fill="#9AAAB4" text-anchor="middle">de cláusulas y riesgos.</text>
  <text x="172" y="532" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#00C8E8" text-anchor="middle">95% menos tiempo</text>

  <!-- Card 2 — Manufactura -->
  <rect x="398" y="348" width="284" height="200" fill="#F4F9FB"/>
  <rect x="398" y="348" width="284" height="6" fill="#00C8E8"/>
  <text x="540" y="400" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="#061428" text-anchor="middle">MANUFACTURA</text>
  <text x="540" y="432" font-family="Arial, sans-serif" font-size="17" fill="#6A8A9A" text-anchor="middle">Calidad · Inventario</text>
  <text x="540" y="468" font-family="Arial, sans-serif" font-size="16" fill="#9AAAB4" text-anchor="middle">Control de defectos y</text>
  <text x="540" y="490" font-family="Arial, sans-serif" font-size="16" fill="#9AAAB4" text-anchor="middle">stock predictivo.</text>
  <text x="540" y="532" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#00C8E8" text-anchor="middle">40% menos merma</text>

  <!-- Card 3 — Salud -->
  <rect x="716" y="348" width="284" height="200" fill="#F4F9FB"/>
  <rect x="716" y="348" width="284" height="6" fill="#00C8E8"/>
  <text x="858" y="400" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="#061428" text-anchor="middle">SALUD</text>
  <text x="858" y="432" font-family="Arial, sans-serif" font-size="17" fill="#6A8A9A" text-anchor="middle">Admisiones · Diagnóstico</text>
  <text x="858" y="468" font-family="Arial, sans-serif" font-size="16" fill="#9AAAB4" text-anchor="middle">Triaje inteligente y</text>
  <text x="858" y="490" font-family="Arial, sans-serif" font-size="16" fill="#9AAAB4" text-anchor="middle">gestión de pacientes.</text>
  <text x="858" y="532" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#00C8E8" text-anchor="middle">3x más capacidad</text>

  <!-- Fila 2 -->

  <!-- Card 4 — Finanzas -->
  <rect x="80" y="572" width="284" height="200" fill="#061428"/>
  <rect x="80" y="572" width="284" height="6" fill="#00C8E8"/>
  <text x="172" y="624" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle">FINANZAS</text>
  <text x="172" y="656" font-family="Arial, sans-serif" font-size="17" fill="#4A8A9A" text-anchor="middle">Fraude · Reportes · KYC</text>
  <text x="172" y="692" font-family="Arial, sans-serif" font-size="16" fill="#2A5A6A" text-anchor="middle">Conciliación automática</text>
  <text x="172" y="714" font-family="Arial, sans-serif" font-size="16" fill="#2A5A6A" text-anchor="middle">y detección de anomalías.</text>
  <text x="172" y="752" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#00C8E8" text-anchor="middle">80% tareas eliminadas</text>

  <!-- Card 5 — Logística -->
  <rect x="398" y="572" width="284" height="200" fill="#061428"/>
  <rect x="398" y="572" width="284" height="6" fill="#00C8E8"/>
  <text x="540" y="624" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle">LOGÍSTICA</text>
  <text x="540" y="656" font-family="Arial, sans-serif" font-size="17" fill="#4A8A9A" text-anchor="middle">Rutas · Pedidos · Tracking</text>
  <text x="540" y="692" font-family="Arial, sans-serif" font-size="16" fill="#2A5A6A" text-anchor="middle">Optimización de rutas</text>
  <text x="540" y="714" font-family="Arial, sans-serif" font-size="16" fill="#2A5A6A" text-anchor="middle">y gestión de excepciones.</text>
  <text x="540" y="752" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#00C8E8" text-anchor="middle">30% menos costos</text>

  <!-- Card 6 — Educación -->
  <rect x="716" y="572" width="284" height="200" fill="#061428"/>
  <rect x="716" y="572" width="284" height="6" fill="#00C8E8"/>
  <text x="858" y="624" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" text-anchor="middle">EDUCACIÓN</text>
  <text x="858" y="656" font-family="Arial, sans-serif" font-size="17" fill="#4A8A9A" text-anchor="middle">Tutores · Admin · Contenido</text>
  <text x="858" y="692" font-family="Arial, sans-serif" font-size="16" fill="#2A5A6A" text-anchor="middle">Aprendizaje personalizado</text>
  <text x="858" y="714" font-family="Arial, sans-serif" font-size="16" fill="#2A5A6A" text-anchor="middle">y admin automatizado.</text>
  <text x="858" y="752" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#00C8E8" text-anchor="middle">2x engagement</text>

  <!-- Separador -->
  <rect x="80" y="810" width="920" height="1" fill="#E0E8EC"/>

  <!-- CTA -->
  <text x="540" y="878" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="#061428" text-anchor="middle">¿Y en tu industria?</text>
  <text x="540" y="918" font-family="Arial, sans-serif" font-size="22" fill="#6A8A9A" text-anchor="middle">Escribinos — en 48hs te mostramos dónde automatizar primero.</text>

  <!-- CTA button -->
  <rect x="340" y="940" width="400" height="56" fill="#00C8E8"/>
  <text x="540" y="975" font-family="Arial Black, Arial, sans-serif" font-size="16" font-weight="900" fill="#061428" text-anchor="middle" letter-spacing="2">DIAGNÓSTICO GRATUITO</text>

  <!-- Logo footer -->
  <text x="80" y="1048" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#061428">Digital<tspan fill="#00C8E8">Axios</tspan></text>
  <text x="998" y="1048" font-family="Arial, sans-serif" font-size="16" fill="#9AAAB4" text-anchor="end" letter-spacing="2">CUSTOM SOFTWARE ENGINEERING</text>

</svg>
