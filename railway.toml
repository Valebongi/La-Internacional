# Railway deployment configuration
# This file is intentionally minimal to allow auto-detection of multiple services.
# 
# For multi-service projects (frontend + backend), it's better to let Railway
# auto-detect Dockerfiles rather than hard-code paths.
#
# Supported Dockerfile names for auto-detection:
# - Dockerfile (default)
# - Dockerfile.{serviceName}
#
# Railway will auto-detect:
# - Dockerfile.backend → Backend service
# - Dockerfile.frontend → Frontend service
# 
# Manual configuration can be done in Railway Dashboard UI.

# If you need to override, uncomment and modify:
# [build]
# builder = "DOCKERFILE"
# dockerfilePath = "Dockerfile.backend"
# 
# [deploy]
# startCommand = "node apps/backend/dist/services/gateway/main"
